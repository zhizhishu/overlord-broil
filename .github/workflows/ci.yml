name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build backend
        working-directory: springboot-backend
        run: mvn -B -DskipTests package

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vite-frontend/package.json
      - name: Install frontend dependencies
        working-directory: vite-frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Build frontend
        working-directory: vite-frontend
        run: npm run build

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts
        run: bash -n scripts/*.sh
      - name: Run agent mock tests
        run: bash scripts/test-flux-agent-mock.sh
      - name: Validate compose files
        env:
          DB_NAME: gost
          DB_USER: gost
          DB_PASSWORD: test-password
          JWT_SECRET: test-jwt-secret
          FRONTEND_PORT: "18080"
          BACKEND_PORT: "16365"
        run: |
          docker compose -f docker-compose-v4.yml config --quiet
          docker compose -f docker-compose-v6.yml config --quiet
