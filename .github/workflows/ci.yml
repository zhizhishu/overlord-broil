name: CI

on:
  push:
    branches: ["main", "future"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build backend
        working-directory: springboot-backend
        run: mvn -B -DskipTests package

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: vite-frontend/package.json
      - name: Install frontend dependencies
        working-directory: vite-frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund
      - name: Build frontend
        working-directory: vite-frontend
        run: npm run build

  scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate shell scripts
        run: |
          bash -n scripts/*.sh
          sh -n scripts/install-master-bootstrap.sh scripts/install-flux-agent-bootstrap.sh
      - name: Run agent mock tests
        run: bash scripts/test-flux-agent-mock.sh
      - name: Run 3x-ui fixture tests
        run: bash scripts/test-three-xui-fixture.sh
      - name: Validate compose files
        env:
          DB_NAME: gost
          DB_USER: gost
          DB_PASSWORD: test-password
          JWT_SECRET: test-jwt-secret
          SECRET_ENCRYPTION_KEY: test-secret-encryption-key
          FRONTEND_PORT: "18080"
          BACKEND_PORT: "16365"
          EXPOSE_BACKEND: "0"
          PHPMYADMIN_PORT: ""
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose-v4.yml config --quiet
          docker compose -f docker-compose-v6.yml config --quiet
          docker compose -f docker-compose.legacy-v4.yml config --quiet
          docker compose -f docker-compose.legacy-v6.yml config --quiet
      - name: Validate master port contract
        run: bash scripts/test-master-port-contract.sh
      - name: Dry-run compose smoke script
        run: bash scripts/test-compose-smoke.sh --build-local --dry-run
      - name: Run compose smoke test
        timeout-minutes: 25
        run: bash scripts/test-compose-smoke.sh --build-local

  install-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:12-slim
          - ubuntu:24.04
          - alpine:3.20
          - rockylinux:9
          - oraclelinux:9-slim
    steps:
      - uses: actions/checkout@v5
      - name: Run installer diagnostics in ${{ matrix.image }}
        run: bash scripts/test-install-matrix.sh --image "${{ matrix.image }}"
