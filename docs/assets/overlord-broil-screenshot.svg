<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">Overlord Broil eight-module control center</title>
  <desc id="desc">A dense operations console with eight product modules: dashboard, servers, inbound nodes, routing, forwarding, traffic, certificates and settings.</desc>
  <defs>
    <style>
      .bg { fill: #eef2f5; }
      .shell { fill: #f8fafb; stroke: #d7dee7; stroke-width: 1; }
      .sidebar { fill: #101820; }
      .nav { fill: #1b2631; }
      .nav-active { fill: #d9f99d; }
      .ink { fill: #17212b; font-family: Segoe UI, Inter, Arial, sans-serif; }
      .muted { fill: #64748b; font-family: Segoe UI, Inter, Arial, sans-serif; }
      .inverse { fill: #f8fafc; font-family: Segoe UI, Inter, Arial, sans-serif; }
      .thin { fill: #94a3b8; font-family: Segoe UI, Inter, Arial, sans-serif; }
      .card { fill: #ffffff; stroke: #dce3eb; stroke-width: 1; }
      .surface { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .line { stroke: #e2e8f0; stroke-width: 1; }
      .green { fill: #16a34a; }
      .green-soft { fill: #dcfce7; }
      .amber { fill: #d97706; }
      .amber-soft { fill: #fef3c7; }
      .red { fill: #dc2626; }
      .red-soft { fill: #fee2e2; }
      .blue { fill: #2563eb; }
      .blue-soft { fill: #dbeafe; }
      .slate-soft { fill: #e2e8f0; }
      .mono { fill: #334155; font-family: Consolas, Menlo, monospace; }
    </style>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="960"/>
  <rect x="48" y="44" width="1504" height="872" rx="18" class="shell" filter="url(#shadow)"/>

  <rect x="48" y="44" width="238" height="872" rx="18" class="sidebar"/>
  <rect x="268" y="44" width="18" height="872" fill="#101820"/>
  <text x="84" y="102" class="inverse" font-size="27" font-weight="700">Overlord</text>
  <text x="150" y="102" class="thin" font-size="17">Broil</text>
  <g font-size="14" font-weight="700">
    <rect x="82" y="142" width="166" height="34" rx="7" class="nav-active"/><text x="106" y="164" class="ink">Dashboard</text>
    <rect x="82" y="190" width="166" height="34" rx="7" class="nav"/><text x="106" y="212" class="thin">Servers</text>
    <rect x="82" y="238" width="166" height="34" rx="7" class="nav"/><text x="106" y="260" class="thin">Inbound Nodes</text>
    <rect x="82" y="286" width="166" height="34" rx="7" class="nav"/><text x="106" y="308" class="thin">Outbound & Routing</text>
    <rect x="82" y="334" width="166" height="34" rx="7" class="nav"/><text x="106" y="356" class="thin">Forward/Tunnels</text>
    <rect x="82" y="382" width="166" height="34" rx="7" class="nav"/><text x="106" y="404" class="thin">Traffic</text>
    <rect x="82" y="430" width="166" height="34" rx="7" class="nav"/><text x="106" y="452" class="thin">Certificates</text>
    <rect x="82" y="478" width="166" height="34" rx="7" class="nav"/><text x="106" y="500" class="thin">Settings</text>
  </g>
  <rect x="82" y="786" width="166" height="74" rx="8" fill="#172331"/>
  <text x="105" y="816" class="inverse" font-size="14" font-weight="700">Node access</text>
  <text x="105" y="842" class="thin" font-size="13">poll, execute, report</text>

  <text x="328" y="98" class="ink" font-size="29" font-weight="750">Overlord Broil Control Center</text>
  <text x="328" y="128" class="muted" font-size="15">One workspace for servers, protocol nodes, Snell, routing, forwarding, traffic and certificates.</text>
  <rect x="1198" y="76" width="150" height="40" rx="8" class="blue"/>
  <text x="1229" y="101" class="inverse" font-size="14" font-weight="700">Create plan</text>
  <rect x="1364" y="76" width="118" height="40" rx="8" class="green-soft"/>
  <text x="1393" y="101" class="ink" font-size="14" font-weight="700">Add Node</text>

  <g>
    <rect x="328" y="162" width="250" height="104" rx="8" class="card"/>
    <text x="354" y="198" class="muted" font-size="13">Online servers</text>
    <text x="354" y="235" class="ink" font-size="34" font-weight="800">12/14</text>
    <rect x="487" y="205" width="54" height="22" rx="11" class="green-soft"/>
    <text x="502" y="220" class="green" font-size="12" font-weight="700">OK</text>

    <rect x="602" y="162" width="250" height="104" rx="8" class="card"/>
    <text x="628" y="198" class="muted" font-size="13">Inbound nodes</text>
    <text x="628" y="235" class="ink" font-size="34" font-weight="800">48</text>
    <text x="704" y="233" class="muted" font-size="13">full 39 / light 9</text>

    <rect x="876" y="162" width="250" height="104" rx="8" class="card"/>
    <text x="902" y="198" class="muted" font-size="13">Forward/Tunnels</text>
    <text x="902" y="235" class="ink" font-size="34" font-weight="800">31/34</text>

    <rect x="1150" y="162" width="332" height="104" rx="8" class="card"/>
    <text x="1176" y="198" class="muted" font-size="13">Traffic / warnings</text>
    <text x="1176" y="235" class="ink" font-size="34" font-weight="800">1.8 TB</text>
    <rect x="1320" y="205" width="84" height="22" rx="11" class="amber-soft"/>
    <text x="1338" y="220" class="amber" font-size="12" font-weight="700">3 watch</text>
  </g>

  <g>
    <rect x="328" y="302" width="392" height="250" rx="8" class="card"/>
    <text x="354" y="338" class="ink" font-size="19" font-weight="750">Servers</text>
    <text x="354" y="365" class="muted" font-size="13">One command join, heartbeat and service state.</text>
    <rect x="354" y="394" width="318" height="118" rx="8" class="surface"/>
    <text x="378" y="426" class="ink" font-size="17" font-weight="750">oracle-sg-01</text>
    <rect x="560" y="407" width="62" height="23" rx="11" class="green-soft"/>
    <text x="576" y="423" class="green" font-size="12" font-weight="700">agent</text>
    <text x="378" y="458" class="muted" font-size="13">CPU 12%  MEM 41%  cert valid</text>
    <text x="378" y="486" class="mono" font-size="13">join / route / forward / sync traffic</text>

    <rect x="744" y="302" width="350" height="250" rx="8" class="card"/>
    <text x="770" y="338" class="ink" font-size="19" font-weight="750">Inbound Nodes</text>
    <text x="770" y="365" class="muted" font-size="13">VLESS Reality, VMess, Trojan, Shadowsocks, Snell.</text>
    <line x1="770" y1="396" x2="1062" y2="396" class="line"/>
    <text x="780" y="426" class="mono" font-size="13">443 reality  active</text>
    <text x="780" y="462" class="mono" font-size="13">8443 vmess-ws active</text>
    <text x="780" y="498" class="mono" font-size="13">6153 snell   active</text>

    <rect x="1118" y="302" width="364" height="250" rx="8" class="card"/>
    <text x="1144" y="338" class="ink" font-size="19" font-weight="750">Outbound & Routing</text>
    <text x="1144" y="365" class="muted" font-size="13">Outbound tags, rules, IPv4/IPv6 and rule priority.</text>
    <rect x="1144" y="396" width="292" height="42" rx="8" class="surface"/>
    <text x="1164" y="422" class="ink" font-size="14" font-weight="700">direct / proxy / block</text>
    <rect x="1144" y="454" width="292" height="42" rx="8" class="surface"/>
    <text x="1164" y="480" class="ink" font-size="14" font-weight="700">domainStrategy: IPIfNonMatch</text>
  </g>

  <g>
    <rect x="328" y="586" width="270" height="276" rx="8" class="card"/>
    <text x="354" y="622" class="ink" font-size="19" font-weight="750">Forward/Tunnels</text>
    <text x="354" y="649" class="muted" font-size="13">Remote TCP/UDP services.</text>
    <text x="354" y="696" class="mono" font-size="13">30080 -> 10.0.0.5:80</text>
    <text x="354" y="734" class="mono" font-size="13">30443 -> 10.0.0.5:443</text>
    <rect x="354" y="786" width="72" height="28" rx="7" class="blue-soft"/>
    <text x="374" y="805" class="blue" font-size="12" font-weight="700">restart</text>

    <rect x="622" y="586" width="270" height="276" rx="8" class="card"/>
    <text x="648" y="622" class="ink" font-size="19" font-weight="750">Traffic</text>
    <text x="648" y="649" class="muted" font-size="13">Server and source filters plus sync.</text>
    <rect x="648" y="682" width="196" height="34" rx="7" class="surface"/>
    <text x="666" y="704" class="muted" font-size="13">server: all</text>
    <rect x="648" y="728" width="196" height="34" rx="7" class="surface"/>
    <text x="666" y="750" class="muted" font-size="13">source: inbound/outbound</text>
    <text x="648" y="812" class="ink" font-size="24" font-weight="800">1.8 TB</text>

    <rect x="916" y="586" width="270" height="276" rx="8" class="card"/>
    <text x="942" y="622" class="ink" font-size="19" font-weight="750">Certificates</text>
    <text x="942" y="649" class="muted" font-size="13">Issue, renew and inspect expiry.</text>
    <rect x="942" y="686" width="180" height="24" rx="12" class="green-soft"/>
    <text x="966" y="703" class="green" font-size="12" font-weight="700">valid 72 days</text>
    <rect x="942" y="728" width="180" height="24" rx="12" class="amber-soft"/>
    <text x="966" y="745" class="amber" font-size="12" font-weight="700">renew soon</text>
    <text x="942" y="812" class="mono" font-size="13">apply / renew / details</text>

    <rect x="1210" y="586" width="272" height="276" rx="8" class="card"/>
    <text x="1236" y="622" class="ink" font-size="19" font-weight="750">Settings</text>
    <text x="1236" y="649" class="muted" font-size="13">Users, security, backups, updates and logs.</text>
    <text x="1236" y="696" class="mono" font-size="13">token hidden</text>
    <text x="1236" y="734" class="mono" font-size="13">backup ready</text>
    <text x="1236" y="772" class="mono" font-size="13">6 recent events</text>
  </g>
</svg>
